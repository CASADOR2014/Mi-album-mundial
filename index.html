<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTAS DEL MUNDIAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Álbum del Mundial</h1>
        <input type="text" id="buscador" placeholder="Busca por nombre, país o número...">
    </header>

    <main>
        <section id="agregar-estampa">
            <h2>Agregar Nueva Estampa</h2>
            <div id="contenedor-camara">
                <video id="video" autoplay playsinline></video>
                <button id="boton-foto">Tomar Foto</button>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>

            <div class="inputs">
                <input type="text" id="nombre" placeholder="Nombre del jugador">
                <input type="number" id="numero" placeholder="Número de estampa">
                <input type="text" id="pais" placeholder="País (Ej: México, Brasil...)">
                <button id="btn-guardar">Guardar en el Álbum</button>
            </div>
        </section>

        <hr>

        <section id="contenedor-album">
            <h2>Mi Colección por Países</h2>
            <div id="lista-estampas"></div>
        </section>
    </main>

    <footer>
        <div class="redes-sociales">
            <p>Sígueme en mis redes:</p>
            <div class="iconos-redes">
                <a href="https://facebook.com/fernando.posada.7334" target="_blank">Facebook</a>
                <a href="https://instagram.com/casador2014" target="_blank">Instagram</a>
                <a href="https://github.com/CASADOR2014" target="_blank">GitHub</a>
            </div>
        </div>
        <div class="copyright">
            <p>© 2026 - Desarrollado por <strong>Elvin Posadas</strong></p>
            <p>¡Colecciona, intercambia y gana! ⚽</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
