<!DOCTYPE html>
<html lang="enS">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTAS DEL MUNDIAL</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Albun del mundial</h1>
        <input type="text" id="buscador" placeholder="busca por nombre, pais o numero...">
    </header>

    <main>
        <section id="agregar-estampa">
            <h2>Agregar Nueva</h2>
            <div id="contenedor-camara">
                <video id="video" autoplay playsinline></video>
                <button id="boton-foto">Tomar Foto</button>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>

            <div class="inputs">
                <input type="text" id="nombre" placeholder="Nombre del jugador">
                <input type="number" id="numero" placeholder="numero">
                <input type="text" id="pais" placeholder="pais">
                <button id="btn-guardar">Guardar en el album</button>
            </div>
        </section>
        <hr>
        <section id="contenedor-album">
            <h2>Mi Coleccion</h2>
            <div id="lista-estampas"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
